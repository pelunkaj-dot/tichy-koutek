<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Skládačka – Tichý koutek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{background:#F5F0E8;font-family:'Nunito',sans-serif;max-width:480px;margin:0 auto;min-height:100dvh;overflow-x:hidden}

/* HEADER */
.hdr{background:#1D9E75;padding:1.2rem 1rem 1.1rem;display:flex;align-items:center;gap:.8rem;border-radius:0 0 22px 22px}
.back-btn{background:rgba(255,255,255,.18);border:none;color:white;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;padding:8px 14px;border-radius:12px;cursor:pointer;text-decoration:none;display:inline-block;flex-shrink:0}
.hdr-text h1{font-size:20px;font-weight:800;color:white}
.hdr-text p{font-size:11px;color:rgba(255,255,255,.7);margin-top:1px}

/* SELECT VIEW */
.puzzles-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px}
.pcard{border-radius:18px;overflow:hidden;cursor:pointer;border:3px solid transparent;transition:transform .12s;background:white;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.pcard:active{transform:scale(.93)}
.pcard svg{width:100%;height:auto;display:block}
.pcard-name{font-size:13px;font-weight:800;padding:8px 10px 10px;color:#2C2C2A;line-height:1.2}

/* GAME VIEW */
#game-view{display:none;flex-direction:column;min-height:100dvh}
.game-hdr{background:#1D9E75;padding:1rem;display:flex;align-items:center;gap:.7rem;border-radius:0 0 22px 22px}
.game-title{font-size:16px;font-weight:800;color:white;flex:1}
.progress-badge{background:rgba(255,255,255,.22);color:white;font-size:13px;font-weight:800;padding:5px 12px;border-radius:12px;white-space:nowrap;flex-shrink:0}

/* REFERENČNÍ OBRÁZEK */
.ref-wrap{padding:10px 12px 0;display:flex;align-items:center;gap:10px}
.ref-label{font-size:11px;font-weight:800;color:#888;white-space:nowrap}
.ref-img{border-radius:10px;overflow:hidden;border:2.5px solid #1D9E75;flex-shrink:0}
.ref-img svg{display:block;width:120px;height:80px}

/* BOARD */
.board{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 12px}
.slot{aspect-ratio:3/2;border-radius:12px;border:2.5px dashed rgba(0,0,0,.2);overflow:hidden;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative;background:rgba(0,0,0,.04)}
.slot.filled{border-style:solid;border-color:#1D9E75;cursor:default}
.slot.correct-flash{box-shadow:0 0 0 4px #1D9E75;animation:correct-pop .35s ease}
.slot.wrong-flash{border-color:#E24B4A !important;box-shadow:0 0 0 3px #E24B4A;animation:shake .35s ease}
.slot svg{width:100%;height:100%;display:block}
.slot-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;opacity:.18;pointer-events:none}

/* TRAY */
.tray-label{font-size:11px;font-weight:800;color:#888;padding:4px 12px 0;text-transform:uppercase;letter-spacing:.5px}
.tray{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:6px 12px 16px}
.piece{aspect-ratio:3/2;border-radius:12px;border:3px solid transparent;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s,box-shadow .15s;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.piece:active{transform:scale(.94)}
.piece.selected{border-color:#3C3489;transform:scale(1.06);box-shadow:0 4px 14px rgba(60,52,137,.35)}
.piece svg{width:100%;height:100%;display:block}

/* WIN */
#win-overlay{display:none;position:fixed;inset:0;background:rgba(20,18,44,.88);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:2rem}
#win-overlay.show{display:flex}
.win-emoji{font-size:80px;animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
.win-title{font-size:32px;font-weight:900;color:white}
.win-sub{font-size:15px;color:rgba(255,255,255,.6);font-weight:700}
.win-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.win-btn{font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;padding:13px 26px;border-radius:16px;border:none;cursor:pointer}
.btn-primary{background:#EF9F27;color:#2C1A00}
.btn-secondary{background:rgba(255,255,255,.15);color:white}
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:99}

@keyframes correct-pop{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes pop{0%{transform:scale(0) rotate(-10deg)}80%{transform:scale(1.15)}100%{transform:scale(1)}}
</style>
</head>
<body>

<!-- SELECT VIEW -->
<div id="select-view">
  <header class="hdr">
    <a href="index.html" class="back-btn">← Zpět</a>
    <div class="hdr-text"><h1>Skládačka</h1><p>Vyber si obrázek</p></div>
  </header>
  <div class="puzzles-grid" id="puzzles-grid"></div>
</div>

<!-- GAME VIEW -->
<div id="game-view">
  <header class="game-hdr">
    <button class="back-btn" onclick="showSelect()">← Zpět</button>
    <span class="game-title" id="game-title">Skládačka</span>
    <span class="progress-badge"><span id="prog">0</span>&nbsp;/&nbsp;6</span>
  </header>
  <div class="ref-wrap">
    <span class="ref-label">Nápověda:</span>
    <div class="ref-img"><svg id="ref-svg" viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg"></svg></div>
  </div>
  <div class="board" id="board"></div>
  <div class="tray-label">Dílky:</div>
  <div class="tray" id="tray"></div>
</div>

<!-- WIN -->
<div id="win-overlay">
  <div class="win-emoji">🎊</div>
  <div class="win-title">Výborně!</div>
  <div class="win-sub">Skládačka je hotová!</div>
  <div class="win-btns">
    <button class="win-btn btn-primary" onclick="replayPuzzle()">Zkusit znovu</button>
    <button class="win-btn btn-secondary" onclick="showSelect()">Jiný obrázek</button>
  </div>
</div>
<canvas id="confetti-canvas"></canvas>

// ═══════════════════════════════════════════════
// DEFINICE PUZZLÍ
// ═══════════════════════════════════════════════
const PUZZLES = [
  {id:'archa',    name:'Noe a archa',         emoji:'🌊', bg:'#C8DFFE'},
  {id:'betlem',   name:'Betlém',              emoji:'⭐', bg:'#26215C'},
  {id:'ovce',     name:'Ježíš a ovečky',      emoji:'🐑', bg:'#C8DFFE'},
  {id:'david',    name:'David a Goliáš',      emoji:'🪨', bg:'#87BDEE'},
  {id:'jonas',    name:'Jonáš a velryba',     emoji:'🐟', bg:'#0C447C'},
  {id:'stvoreni', name:'Stvoření světa',      emoji:'🌍', bg:'#26215C'},
  {id:'daniel',   name:'Daniel ve lví jámě',  emoji:'🦁', bg:'#1A1830'},
  {id:'more',     name:'Ježíš na moři',       emoji:'⛵', bg:'#1D4E6A'},
  {id:'mojzis',   name:'Mojžíš a hořící keř', emoji:'🔥', bg:'#FAEEDA'},
  {id:'deti',     name:'Ježíš s dětmi',       emoji:'👧', bg:'#E6F1FB'},
];

// 2 sloupce × 3 řady = 6 dílků
// Každý dílek: 180×80 v SVG prostoru (viewBox 0 0 360 240 → 360/2=180, 240/3=80)
const COLS = 2, ROWS = 3;
const PW = 360 / COLS;   // = 180
const PH = 240 / ROWS;   // = 80

// ═══════════════════════════════════════════════
// STAV HRY
// ═══════════════════════════════════════════════
let currentPuzzle = null;
let shuffledPieces = []; // [{col, row, id}] shuffled order
let placed = {};         // key "col-row" → true
let selected = null;     // id "col-row" of selected tray piece

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function initSelect() {
  const grid = document.getElementById('puzzles-grid');
  grid.innerHTML = PUZZLES.map(p => `
    <button class="pcard" onclick="startPuzzle('${p.id}')">
      <svg viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg">
        <rect width="360" height="240" fill="${p.bg}"/>
        ${SCENES[p.id]}
      </svg>
      <div class="pcard-name">${p.emoji} ${p.name}</div>
    </button>
  `).join('');
}

// ═══════════════════════════════════════════════
// VIEWS
// ═══════════════════════════════════════════════
function showSelect() {
  document.getElementById('select-view').style.display = 'block';
  document.getElementById('game-view').style.display = 'none';
  document.getElementById('win-overlay').classList.remove('show');
  window.scrollTo(0, 0);
}
function showGame() {
  document.getElementById('select-view').style.display = 'none';
  document.getElementById('game-view').style.display = 'flex';
  window.scrollTo(0, 0);
}

// ═══════════════════════════════════════════════
// SPUŠTĚNÍ
// ═══════════════════════════════════════════════
function startPuzzle(id) {
  currentPuzzle = PUZZLES.find(p => p.id === id);
  placed = {};
  selected = null;

  // Vytvoř 6 dílků a zamíchej je
  let all = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      all.push({col: c, row: r, id: `${c}-${r}`});
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  shuffledPieces = all;

  document.getElementById('game-title').textContent = currentPuzzle.name;
  document.getElementById('prog').textContent = '0';

  // Referenční obrázek
  document.getElementById('ref-svg').innerHTML =
    `<rect width="360" height="240" fill="${currentPuzzle.bg}"/>${SCENES[currentPuzzle.id]}`;

  renderBoard();
  renderTray();
  showGame();
}

function replayPuzzle() { startPuzzle(currentPuzzle.id); }

// ═══════════════════════════════════════════════
// RENDEROVÁNÍ
// ═══════════════════════════════════════════════
function pieceSVG(p) {
  const vx = p.col * PW, vy = p.row * PH;
  return `<svg viewBox="${vx} ${vy} ${PW} ${PH}" xmlns="http://www.w3.org/2000/svg">
    <rect width="360" height="240" fill="${currentPuzzle.bg}"/>
    ${SCENES[currentPuzzle.id]}
  </svg>`;
}

function renderBoard() {
  const board = document.getElementById('board');
  let html = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const key = `${c}-${r}`;
      if (placed[key]) {
        const p = {col: c, row: r};
        html += `<div class="slot filled" id="slot-${key}">${pieceSVG(p)}</div>`;
      } else {
        html += `<div class="slot" id="slot-${key}" onclick="tryPlace('${key}')"></div>`;
      }
    }
  }
  board.innerHTML = html;
}

function renderTray() {
  const tray = document.getElementById('tray');
  const remaining = shuffledPieces.filter(p => !placed[p.id]);
  if (remaining.length === 0) { tray.innerHTML = ''; return; }
  tray.innerHTML = remaining.map(p => `
    <div class="piece${selected === p.id ? ' selected' : ''}" id="piece-${p.id}" onclick="selectPiece('${p.id}')">
      ${pieceSVG(p)}
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════
// LOGIKA HRY
// ═══════════════════════════════════════════════
function selectPiece(id) {
  if (selected === id) { selected = null; }
  else { selected = id; }
  renderTray();
}

function tryPlace(slotKey) {
  if (!selected) {
    // Blikni slot – připomeň dítěti, aby si nejdřív vybralo dílek
    const slotEl = document.getElementById('slot-' + slotKey);
    if (slotEl) { slotEl.style.borderColor = '#EF9F27'; setTimeout(() => { slotEl.style.borderColor = ''; }, 500); }
    return;
  }
  // Správná pozice?
  if (selected === slotKey) {
    // SPRÁVNĚ
    placed[slotKey] = true;
    selected = null;
    const count = Object.keys(placed).length;
    document.getElementById('prog').textContent = count;
    renderBoard();
    renderTray();
    // Flash správného slotu
    setTimeout(() => {
      const sl = document.getElementById('slot-' + slotKey);
      if (sl) { sl.classList.add('correct-flash'); setTimeout(() => sl.classList.remove('correct-flash'), 400); }
    }, 30);
    if (count === ROWS * COLS) setTimeout(showWin, 600);
  } else {
    // ŠPATNĚ
    const slotEl = document.getElementById('slot-' + slotKey);
    const pieceEl = document.getElementById('piece-' + selected);
    if (slotEl) { slotEl.classList.add('wrong-flash'); setTimeout(() => slotEl.classList.remove('wrong-flash'), 400); }
    if (pieceEl) { pieceEl.style.transform = 'none'; }
    selected = null;
    renderTray();
  }
}

// ═══════════════════════════════════════════════
// VÝHRA
// ═══════════════════════════════════════════════
function showWin() {
  document.getElementById('win-overlay').classList.add('show');
  startConfetti();
}

// ═══════════════════════════════════════════════
// KONFETY
// ═══════════════════════════════════════════════
function startConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const colors = ['#EF9F27','#E24B4A','#639922','#378ADD','#993556','#FAC775','#3C3489','#1D9E75'];
  const pieces = Array.from({length:80}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height * 0.5,
    r: Math.random() * 7 + 4,
    color: colors[Math.floor(Math.random() * colors.length)],
    vx: (Math.random() - 0.5) * 4,
    vy: Math.random() * 4 + 2,
    rot: Math.random() * Math.PI * 2,
    vrot: (Math.random() - 0.5) * 0.15,
    isRect: Math.random() > 0.5
  }));
  let frame, t = 0;
  function draw() {
    t++;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      if (p.isRect) { ctx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r); }
      else { ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI * 2); ctx.fill(); }
      ctx.restore();
      p.x += p.vx; p.y += p.vy; p.rot += p.vrot;
      if (p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
    });
    frame = requestAnimationFrame(draw);
    if (t > 200) { cancelAnimationFrame(frame); ctx.clearRect(0, 0, canvas.width, canvas.height); }
  }
  draw();
}

// START
initSelect();
</script>
