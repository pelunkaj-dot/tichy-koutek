*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#F5F0E8;font-family:'Nunito',sans-serif;max-width:640px;margin:0 auto;min-height:100dvh}
/* ── HEADER ── */
.hdr{background:#3C3489;padding:1.5rem 1.25rem 1.4rem;display:flex;align-items:center;gap:1rem;border-radius:0 0 24px 24px}
.back-btn{background:rgba(255,255,255,.15);border:none;color:#EEEDFE;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;padding:8px 14px;border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:6px;flex-shrink:0;transition:background .15s}

.hdr-text h1{font-family:'Lora',serif;font-size:22px;font-weight:600;color:#EEEDFE}
.hdr-text p{font-size:12px;color:#AFA9EC;margin-top:2px}

.story-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:.5rem 1rem 2rem}
.scard{border-radius:18px;padding:1.2rem 1rem 1rem;display:flex;flex-direction:column;gap:8px;cursor:pointer;border:none;text-align:left;transition:transform .12s ease;min-height:140px}
.scard:active{transform:scale(.95)}
.scard-ico{font-size:30px;line-height:1}
.scard-name{font-family:'Lora',serif;font-size:16px;font-weight:600;line-height:1.2;margin-top:2px}
.scard-ref{font-size:11px;font-weight:700;opacity:.65;letter-spacing:.3px;margin-top:auto}
.ca{background:#FAEEDA}.ca .scard-name{color:#633806}.ca .scard-ref{color:#633806}
.cb{background:#E6F1FB}.cb .scard-name{color:#0C447C}.cb .scard-ref{color:#0C447C}
.ct{background:#E1F5EE}.ct .scard-name{color:#085041}.ct .scard-ref{color:#085041}
.cc{background:#FAECE7}.cc .scard-name{color:#4A1B0C}.cc .scard-ref{color:#4A1B0C}
.cp{background:#EEEDFE}.cp .scard-name{color:#26215C}.cp .scard-ref{color:#26215C}
.cpk{background:#FBEAF0}.cpk .scard-name{color:#4B1528}.cpk .scard-ref{color:#4B1528}
/* ── STORY VIEW ── */
#story-view{display:none}
.story-illo{width:100%;border-radius:0 0 24px 24px;overflow:hidden;line-height:0}
.story-illo svg{width:100%;height:auto;display:block}
.story-body{padding:1.25rem 1.1rem 3rem}
.story-ref-label{font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:#AFA9EC;display:block;margin-bottom:4px}
.story-title{font-family:'Lora',serif;font-size:26px;font-weight:600;color:#26215C;line-height:1.2;margin-bottom:1.2rem}
.story-para{font-size:17px;line-height:1.75;color:#2C2C2A;margin-bottom:1rem}
.fact-box{background:#FAEEDA;border-radius:16px;padding:1rem 1.1rem;margin:1.5rem 0 1rem}
.fact-label{font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#854F0B;margin-bottom:6px}
.fact-text{font-size:15px;line-height:1.65;color:#633806;font-weight:600}
.q-box{background:#EEEDFE;border-radius:16px;padding:1rem 1.1rem;margin:0}
.q-label{font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#3C3489;margin-bottom:6px}

function showList(){
  document.getElementById('list-view').style.display='';
  document.getElementById('story-view').style.display='none';
  window.scrollTo({top:0,behavior:'instant'});
}

function showStory(id){
  const s=stories.find(x=>x.id===id);
  if(!s)return;
  const sv=document.getElementById('story-view');
  sv.innerHTML=buildStory(s);
  document.getElementById('list-view').style.display='none';
  sv.style.display='';
  window.scrollTo({top:0,behavior:'instant'});
}

function buildStory(s){
  return `
<header class="hdr">
  <button class="back-btn" onclick="showList()">← Zpět</button>
  <div class="hdr-text"><h1>${s.title}</h1><p>${s.ref}</p></div>
</header>
<div class="story-illo">${s.svg}</div>
<div class="story-body">
  <span class="story-ref-label">${s.ref}</span>
  <h2 class="story-title">${s.title}</h2>
  ${s.paras.map(p=>`<p class="story-para">${p}</p>`).join('')}
  <div class="fact-box">
    <div class="fact-label">💡 Věděl/a jsi?</div>
    <p class="fact-text">${s.fact}</p>
  </div>
  <div class="q-box">
    <div class="q-label">💭 Zamysli se</div>
    <p class="q-text">${s.question}</p>
  </div>
</div>`;
}

window.addEventListener('DOMContentLoaded',()=>{
  const grid=document.getElementById('story-grid');
  grid.innerHTML=stories.map(s=>`
<button class="scard ${s.color}" onclick="showStory('${s.id}')">
  <span class="scard-ico">${s.emoji}</span>
  <span class="scard-name">${s.title}</span>
  <span class="scard-ref">${s.ref}</span>
</button>`).join('');
});
</script>
