<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kreslírna – Tichý koutek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{background:#F5F0E8;font-family:'Nunito',sans-serif;max-width:640px;margin:0 auto;min-height:100dvh;overflow-x:hidden}
/* HEADER */
.hdr{background:#3C3489;padding:1.4rem 1.1rem 1.3rem;display:flex;align-items:center;gap:.9rem;border-radius:0 0 22px 22px}
.back-btn{background:rgba(255,255,255,.15);border:none;color:#EEEDFE;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;padding:8px 13px;border-radius:12px;cursor:pointer;flex-shrink:0}
.back-btn:active{background:rgba(255,255,255,.28)}
.hdr-text h1{font-family:'Lora',serif;font-size:21px;font-weight:600;color:#EEEDFE}
.hdr-text p{font-size:11px;color:#AFA9EC;margin-top:2px}
/* GALERIE */
#gallery-view{}
.sec-label{font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:#AFA9EC;padding:1rem 1rem .4rem;display:block}
.motif-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 1rem}
.motif-card{background:white;border-radius:16px;border:1.5px solid #E6E2DA;padding:.8rem .7rem .7rem;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:transform .1s}
.motif-card:active{transform:scale(.94)}
.motif-card svg{width:100%;height:90px;display:block}
.motif-name{font-size:12px;font-weight:700;color:#412402;text-align:center}
.free-card{background:#EEEDFE;border-color:#CECBF6}
.free-card .motif-name{color:#26215C}
.gallery-foot{height:2rem}
/* KRESLENÍ */
#draw-view{display:none;flex-direction:column;height:100dvh}
.draw-hdr{background:#3C3489;padding:1rem 1rem .9rem;display:flex;align-items:center;gap:.8rem;border-radius:0 0 18px 18px;flex-shrink:0}
.draw-hdr .back-btn{font-size:13px;padding:7px 12px}
.draw-title{font-family:'Lora',serif;font-size:17px;font-weight:600;color:#EEEDFE;flex:1}
/* MODE SWITCH */
.mode-bar{display:flex;gap:6px;padding:.6rem 1rem .4rem;flex-shrink:0}
.mode-btn{flex:1;padding:8px 0;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:background .15s}
.mode-btn.active{background:#3C3489;color:#EEEDFE}
.mode-btn.inactive{background:#E6E2DA;color:#412402}
/* CANVAS AREA */
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:#fff;margin:0 .8rem;border-radius:16px;border:1.5px solid #E6E2DA}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none}
#canvas-outline{z-index:1}
#canvas-color{z-index:2}
#canvas-draw{z-index:3}
/* TOOLBAR */
.toolbar{background:white;border-radius:18px 18px 0 0;border-top:1.5px solid #E6E2DA;padding:.6rem .8rem .5rem;flex-shrink:0}
/* COLOR PALETTE */
.palette{display:flex;flex-wrap:wrap;gap:5px;padding:.3rem 0 .5rem;justify-content:center}
.col-btn{width:30px;height:30px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .1s;flex-shrink:0}
.col-btn:active{transform:scale(.88)}
.col-btn.selected{border-color:#3C3489;transform:scale(1.15)}
.col-custom{background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red);position:relative}
/* TOOL ROW */
.tool-row{display:flex;align-items:center;gap:6px;padding:.3rem 0 .2rem;overflow-x:auto}
.tool-btn{background:#F5F0E8;border:none;border-radius:10px;padding:6px 10px;font-size:18px;cursor:pointer;flex-shrink:0;transition:background .12s}
.tool-btn:active{background:#D3D1C7}
.tool-btn.on{background:#3C3489;font-size:16px}
.size-btn{background:#F5F0E8;border:none;border-radius:10px;padding:5px 9px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;cursor:pointer;color:#412402;flex-shrink:0}
.size-btn.on{background:#3C3489;color:white}
.tool-sep{width:1px;height:28px;background:#D3D1C7;flex-shrink:0}
</style>
</head>

<script>
/* ── DATA ── */
var MOTIFS = {
  beranek:{name:'Beránek',draw:drawBeranek},
  holubice:{name:'Holubice',draw:drawHolubice},
  ryba:{name:'Ryba',draw:drawRyba},
  velryba:{name:'Velryba',draw:drawVelryba},
  lev:{name:'Lev',draw:drawLev},
  osel:{name:'Osel',draw:drawOsel},
  duha:{name:'Duha',draw:drawDuha},
  strom:{name:'Strom s jablky',draw:drawStrom},
  slunce:{name:'Slunce',draw:drawSlunce},
  mesic:{name:'Měsíc a hvězdy',draw:drawMesic},
  kvet:{name:'Květ',draw:drawKvet},
  archa:{name:'Archa',draw:drawArcha},
  kriz:{name:'Kříž',draw:drawKriz},
  hvezda:{name:'Hvězda betlémská',draw:drawHvezda},
  svice:{name:'Svíce',draw:drawSvice},
  chlebpohar:{name:'Chléb a pohár',draw:drawChlebPohar},
  lucerna:{name:'Lucerna',draw:drawLucerna},
  betlem:{name:'Betlém',draw:drawBetlem},
  lodka:{name:'Loďka',draw:drawLodka},
  hora:{name:'Hora',draw:drawHora},
  volne:{name:'Volné plátno',draw:null}
};

var COLORS = [
  '#E24B4A','#EF9F27','#FAC775','#639922','#1D9E75','#378ADD',
  '#534AB7','#D4537E','#888780','#412402','#633806','#854F0B',
  '#0C447C','#085041','#26215C','#4B1528','#F5C4B3','#9FE1CB',
  '#B5D4F4','#CECBF6','#C0DD97','#F7C1C1','#FFFFFF','#000000'
];

var currentColor = '#E24B4A';
var brushSize = 4;
var mode = 'fill';
var erasing = false;
var currentMotif = null;
var undoStack = [];
var drawing = false;
var lastX = 0, lastY = 0;

/* ── PALETTE ── */
(function buildPalette(){
  var pal = document.getElementById('palette');
  COLORS.forEach(function(c){
    var b = document.createElement('button');
    b.className = 'col-btn' + (c === currentColor ? ' selected' : '');
    b.style.background = c;
    if(c === '#FFFFFF') b.style.border = '2px solid #D3D1C7';
    b.onclick = function(){ selectColor(c); };
    pal.appendChild(b);
  });
  /* Custom color picker */
  var inp = document.createElement('input');
  inp.type = 'color';
  inp.style.cssText = 'width:30px;height:30px;border-radius:50%;border:2px solid #D3D1C7;cursor:pointer;padding:0;overflow:hidden';
  inp.title = 'Vlastní barva';
  inp.onchange = function(){ selectColor(this.value); };
  pal.appendChild(inp);
})();

function selectColor(c){
  currentColor = c;
  erasing = false;
  document.getElementById('btn-eraser').classList.remove('on');
  document.querySelectorAll('.col-btn').forEach(function(b){
    b.classList.remove('selected');
    if(b.style.background === c || b.style.backgroundColor === c) b.classList.add('selected');
  });
}

/* ── CANVAS SETUP ── */
var cOutline = document.getElementById('canvas-outline');
var cColor   = document.getElementById('canvas-color');
var cDraw    = document.getElementById('canvas-draw');
var ctxO = cOutline.getContext('2d');
var ctxC = cColor.getContext('2d');
var ctxD = cDraw.getContext('2d');

function resizeCanvases(){
  var wrap = document.getElementById('canvas-wrap');
  var w = wrap.clientWidth;
  var h = wrap.clientHeight;
  [cOutline, cColor, cDraw].forEach(function(c){
    c.width = w;
    c.height = h;
  });
  if(currentMotif) renderOutline();
}

function renderOutline(){
  ctxO.clearRect(0,0,cOutline.width,cOutline.height);
  if(currentMotif === 'volne') return;
  var fn = MOTIFS[currentMotif] && MOTIFS[currentMotif].draw;
  if(fn) fn(ctxO, cOutline.width, cOutline.height);
}

/* ── MOTIF DRAWING FUNCTIONS ── */
function scl(ctx, w, h, fn){
  ctx.save();
  var s = Math.min(w/120, h/90);
  ctx.translate((w - 120*s)/2, (h - 90*s)/2);
  ctx.scale(s, s);
  ctx.strokeStyle = '#412402';
  ctx.lineWidth = 2.5 / s;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  fn(ctx);
  ctx.restore();
}

function drawBeranek(ctx, w, h){
  scl(ctx,w,h,function(c){
    c.beginPath(); c.ellipse(60,52,32,22,0,0,Math.PI*2); c.stroke();
    c.beginPath(); c.ellipse(46,44,14,12,0,0,Math.PI*2); c.stroke();
    c.beginPath(); c.ellipse(60,40,14,12,0,0,Math.PI*2); c.stroke();
    c.beginPath(); c.ellipse(74,44,14,12,0,0,Math.PI*2); c.stroke();
    c.beginPath(); c.ellipse(60,34,12,10,0,0,Math.PI*2); c.stroke();
    c.beginPath(); c.ellipse(84,38,10,9,0,0,Math.PI*2); c.stroke();
    c.fillStyle='#412402'; c.beginPath(); c.arc(87,36,2,0,Math.PI*2); c.fill();
    [[42,72,40,84],[52,74,51,86],[68,74,67,86],[78,72,77,84]].forEach(function(l){
      c.beginPath(); c.moveTo(l[0],l[1]); c.lineTo(l[2],l[3]); c.stroke();
    });
  });
}

function drawHolubice(ctx, w, h){
  scl(ctx,w,h,function(c){
    c.beginPath(); c.ellipse(60,48,28,18,0,0,Math.PI*2); c.stroke();
    c.beginPath(); c.arc(82,38,10,0,Math.PI*2); c.stroke();
    c.fillStyle='#412402'; c.beginPath(); c.arc(85,36,2,0,Math.PI*2); c.fill();
    c.beginPath(); c.moveTo(30,48); c.quadraticCurveTo(15,35,20,25); c.quadraticCurveTo(35,30,30,48); c.stroke();
    c.beginPath(); c.moveTo(30,48); c.quadraticCurveTo(18,55,22,65); c.quadraticCurveTo(36,58,30,48); c.stroke();
    c.beginPath(); c.moveTo(55,65); c.quadraticCurveTo(60,75,65,65); c.stroke();
    c.beginPath(); c.moveTo(86,42); c.quadraticCurveTo(94,40,92,36); c.stroke();
  });
}

function drawRyba(ctx, w, h){
  scl(ctx,w,h,function(c){
    c.beginPath(); c.ellipse(52,45,32,20,0,0,Math.PI*2); c.stroke();
    c.beginPath(); c.moveTo(84,45); c.quadraticCurveTo(100,30,100,45); c.quadraticCurveTo(100,60,84,45); c.stroke();
    c.fillStyle='#412402'; c.beginPath(); c.arc(32,40,3,0,Math.PI*2); c.fill();
    [[48,38,52,34,56,38],[48,45,52,41,56,45],[48,52,52,48,56,52],[62,38,66,34,70,38],[62,45,66,41,70,45],[62,52,66,48,70,52]].forEach(function(a){
      c.beginPath(); c.moveTo(a[0],a[1]); c.quadraticCurveTo(a[2],a[3],a[4],a[5]); c.stroke();
    });
  });
}

function drawVelryba(ctx, w, h){
  scl(ctx,w,h,function(c){
    c.beginPath(); c.moveTo(15,55); c.quadraticCurveTo(20,30,60,32); c.quadraticCurveTo(95,32,100,50); c.quadraticCurveTo(100,68,60,70); c.quadraticCurveTo(30,72,15,55); c.stroke();
    c.beginPath(); c.moveTo(100,50); c.quadraticCurveTo(112,38,112,50); c.quadraticCurveTo(112,62,100,50); c.stroke();
    c.fillStyle='#412402'; c.beginPath(); c.arc(28,46,3,0,Math.PI*2); c.fill();
    c.beginPath(); c.moveTo(55,32); c.quadraticCurveTo(52,18,60,15); c.quadraticCurveTo(68,18,65,32); c.stroke();
    c.beginPath(); c.moveTo(26,40); c.quadraticCurveTo(22,36,20,38); c.stroke();
  });
}

function drawLev(ctx, w, h){
  scl(ctx,w,h,function(c){
    c.beginPath(); c.arc(60,42,20,0,Math.PI*2); c.stroke();
    c.lineWidth=1.8/Math.min(w/120,h/90);
    c.beginPath(); c.arc(60,42,14,0,Math.PI*2); c.stroke();
    c.fillStyle='#412402';
    c.beginPath(); c.arc(54,38,3,0,Math.PI*2); c.fill();
    c.beginPath(); c.arc(66,38,3,0,Math.PI*2); c.fill();
    c.beginPath(); c.ellipse(60,46,5,3,0,0,Math.PI*2); c.stroke();
    c.beginPath(); c.moveTo(55,50); c.quadraticCurveTo(60,54,65,50); c.stroke();
    [[44,46,36,46],[44,48,36,50],[76,46,84,46],[76,48,84,50]].forEach(function(l){
      c.beginPath(); c.moveTo(l[0],l[1]); c.lineTo(l[2],l[3]); c.stroke();
    });
    [[45,62,43,76],[52,64,51,78],[68,64,69,78],[75,62,77,76]].forEach(function(l){
      c.lineWidth=2.5/Math.min(w/120,h/90);
      c.beginPath(); c.moveTo(l[0],l[1]); c.lineTo(l[2],l[3]); c.stroke();
    });
    c.beginPath(); c.moveTo(52,64); c.quadraticCurveTo(60,68,68,64); c.stroke();
    c.beginPath(); c.moveTo(75,76); c.quadraticCurveTo(80,80,78,84); c.stroke();
  });
}

function drawOsel(ctx, w, h){
  scl(ctx,w,h,function(c){
    c.beginPath(); c.roundRect(35,48,50,28,12); c.stroke();
    c.beginPath(); c.roundRect(55,22,22,30,8); c.stroke();
    c.beginPath(); c.ellipse(62,26,4,8,0,0,Math.PI*2); c.stroke();
    c.beginPath(); c.ellipse(72,26,4,8,0,0,Math.PI*2); c.stroke();
    c.fillStyle='#412402'; c.beginPath(); c.arc(63,38,2.5,0,Math.PI*2); c.fill();
    c.beginPath(); c.moveTo(58,44); c.quadraticCurveTo(63,48,68,44); c.stroke();
    [[42,76,40,86],[52,76,51,86],[68,76,67,86],[78,76,79,86]].forEach(function(l){
      c.beginPath(); c.moveTo(l[0],l[1]); c.lineTo(l[2],l[3]); c.stroke();
    });
    c.beginPath(); c.moveTo(82,62); c.quadraticCurveTo(92,58,94,64); c.stroke();
  });
}

function drawDuha(ctx, w, h){
  scl(ctx,w,h,function(c){
    var colors=['#E24B4A','#EF9F27','#FAC775','#639922','#378ADD','#534AB7'];
    colors.forEach(function(col,i){
      var off=i*6;
      c.strokeStyle=col; c.lineWidth=5/Math.min(w/120,h/90);
      c.beginPath(); c.moveTo(10+off,72); c.quadraticCurveTo(60,10+off,110-off,72); c.stroke();
    });
    c.strokeStyle='#412402'; c.lineWidth=2/Math.min(w/120,h/90);
    c.beginPath(); c.ellipse(22,72,14,8,0,0,Math.PI*2); c.stroke();
    c.beginPath(); c.ellipse(98,72,14,8,0,0,Math.PI*2); c.stroke();
  });
}

function drawStrom(ctx, w, h){
  scl(ctx,w,h,function(c){
    c.beginPath(); c.roundRect(52,58,16,28,4); c.stroke();
    c.beginPath(); c.moveTo(60,8); c.lineTo(20,58); c.lineTo(100,58); c.closePath(); c.stroke();
    var apples=[[42,36],[60,28],[78,36],[50,46],[70,46]];
    apples.forEach(function(a){
      c.beginPath(); c.arc(a[0],a[1],5,0,Math.PI*2); c.stroke();
    });
  });
}

function drawSlunce(ctx, w, h){
  scl(ctx,w,h,function(c){
    c.beginPath(); c.arc(60,45,22,0,Math.PI*2); c.stroke();
    c.beginPath(); c.arc(60,45,10,0,Math.PI*2); c.stroke();
    var rays=[[60,10,60,18],[60,72,60,80],[16,45,24,45],[96,45,104,45],[28,17,34,23],[86,67,92,73],[92,17,86,23],[28,73,34,67]];
    rays.forEach(function(r){
      c.beginPath(); c.moveTo(r[0],r[1]); c.lineTo(r[2],r[3]); c.stroke();
    });
    c.fillStyle='#412402';

/* ── GALLERY → DRAW ── */
function openMotif(id){
  currentMotif = id;
  document.getElementById('draw-title').textContent = MOTIFS[id].name;
  document.getElementById('gallery-view').style.display = 'none';
  document.getElementById('draw-view').style.display = 'flex';
  setTimeout(function(){
    resizeCanvases();
    ctxC.clearRect(0,0,cColor.width,cColor.height);
    ctxD.clearRect(0,0,cDraw.width,cDraw.height);
    undoStack = [];
    setMode('fill');
  }, 50);
}

function backToGallery(){
  document.getElementById('draw-view').style.display = 'none';
  document.getElementById('gallery-view').style.display = 'block';
  currentMotif = null;
}

/* ── MODE ── */
function setMode(m){
  mode = m;
  erasing = false;
  document.getElementById('btn-eraser').classList.remove('on');
  document.getElementById('btn-fill').className = 'mode-btn ' + (m==='fill'?'active':'inactive');
  document.getElementById('btn-draw').className = 'mode-btn ' + (m==='draw'?'active':'inactive');
}

function toggleEraser(){
  erasing = !erasing;
  document.getElementById('btn-eraser').classList.toggle('on', erasing);
}

function setSize(s, btnId){
  brushSize = s;
  document.querySelectorAll('.size-btn').forEach(function(b){ b.classList.remove('on'); });
  document.getElementById(btnId).classList.add('on');
}

/* ── FLOOD FILL ── */
function hexToRgb(hex){
  var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return [r,g,b,255];
}

function floodFill(x, y, fillColor){
  var canvas = cColor;
  var ctx = ctxC;
  var w = canvas.width, h = canvas.height;
  // Get pixel data from both outline and color layers merged
  var merged = document.createElement('canvas');
  merged.width = w; merged.height = h;
  var mctx = merged.getContext('2d');
  mctx.drawImage(cColor, 0, 0);
  mctx.drawImage(cOutline, 0, 0);
  var imgData = mctx.getImageData(0,0,w,h);
  var data = imgData.data;
  var idx = (y*w+x)*4;
  var targetR=data[idx], targetG=data[idx+1], targetB=data[idx+2], targetA=data[idx+3];
  var fr=fillColor[0], fg=fillColor[1], fb=fillColor[2];
  if(targetR===fr && targetG===fg && targetB===fb && targetA===255) return;
  var colorData = ctxC.getImageData(0,0,w,h);
  var cd = colorData.data;
  function match(i){ return Math.abs(data[i]-targetR)<30 && Math.abs(data[i+1]-targetG)<30 && Math.abs(data[i+2]-targetB)<30 && Math.abs(data[i+3]-targetA)<30; }
  var stack = [[x,y]];
  var visited = new Uint8Array(w*h);
  while(stack.length){
    var p=stack.pop();
    var px=p[0], py=p[1];
    if(px<0||px>=w||py<0||py>=h) continue;
    var i=(py*w+px);
    if(visited[i]) continue;
    if(!match(i*4)) continue;
    visited[i]=1;
    cd[i*4]=fr; cd[i*4+1]=fg; cd[i*4+2]=fb; cd[i*4+3]=255;
    stack.push([px+1,py],[px-1,py],[px,py+1],[px,py-1]);
  }
  ctxC.putImageData(colorData,0,0);
}

/* ── TOUCH/MOUSE EVENTS ── */
function getPos(e){
  var rect = cDraw.getBoundingClientRect();
  var scaleX = cDraw.width / rect.width;
  var scaleY = cDraw.height / rect.height;
  var src = e.touches ? e.touches[0] : e;
  return {
    x: Math.round((src.clientX - rect.left) * scaleX),
    y: Math.round((src.clientY - rect.top) * scaleY)
  };
}

function onStart(e){
  e.preventDefault();
  var pos = getPos(e);
  if(mode==='fill' && !erasing){
    saveUndo();
    floodFill(pos.x, pos.y, hexToRgb(currentColor));
    return;
  }
  drawing = true;
  lastX = pos.x; lastY = pos.y;
  saveUndo();
}

function onMove(e){
  e.preventDefault();
  if(!drawing) return;
  var pos = getPos(e);
  ctxD.lineCap = 'round';
  ctxD.lineJoin = 'round';
  if(erasing){
    ctxD.globalCompositeOperation = 'destination-out';
    ctxD.lineWidth = brushSize * 3;
    ctxD.strokeStyle = 'rgba(0,0,0,1)';
    // also erase color layer
    ctxC.globalCompositeOperation = 'destination-out';
    ctxC.lineWidth = brushSize * 3;
    ctxC.lineCap = 'round';
    ctxC.beginPath(); ctxC.moveTo(lastX,lastY); ctxC.lineTo(pos.x,pos.y); ctxC.stroke();
    ctxC.globalCompositeOperation = 'source-over';
  } else {
    ctxD.globalCompositeOperation = 'source-over';
    ctxD.lineWidth = brushSize;
    ctxD.strokeStyle = currentColor;
  }
  ctxD.beginPath(); ctxD.moveTo(lastX,lastY); ctxD.lineTo(pos.x,pos.y); ctxD.stroke();
  ctxD.globalCompositeOperation = 'source-over';
  lastX = pos.x; lastY = pos.y;
}

function onEnd(e){
  drawing = false;
}

cDraw.addEventListener('touchstart', onStart, {passive:false});
cDraw.addEventListener('touchmove',  onMove,  {passive:false});
cDraw.addEventListener('touchend',   onEnd,   {passive:false});
cDraw.addEventListener('mousedown',  onStart);
cDraw.addEventListener('mousemove',  onMove);
cDraw.addEventListener('mouseup',    onEnd);

/* ── UNDO ── */
function saveUndo(){
  if(undoStack.length > 20) undoStack.shift();
  undoStack.push({
    color: ctxC.getImageData(0,0,cColor.width,cColor.height),
    draw:  ctxD.getImageData(0,0,cDraw.width,cDraw.height)
  });
}

function undo(){
  if(!undoStack.length) return;
  var s = undoStack.pop();
  ctxC.putImageData(s.color, 0, 0);
  ctxD.putImageData(s.draw, 0, 0);
}

function resetCanvas(){
  saveUndo();
  ctxC.clearRect(0,0,cColor.width,cColor.height);
  ctxD.clearRect(0,0,cDraw.width,cDraw.height);
}

/* ── SAVE ── */
function saveImage(){
  var merged = document.createElement('canvas');
  merged.width = cOutline.width;
  merged.height = cOutline.height;
  var mctx = merged.getContext('2d');
  mctx.fillStyle = '#FFFFFF';
  mctx.fillRect(0,0,merged.width,merged.height);
  mctx.drawImage(cColor,0,0);
  mctx.drawImage(cOutline,0,0);
  mctx.drawImage(cDraw,0,0);
  var url = merged.toDataURL('image/png');
  var a = document.createElement('a');
  a.href = url;
  a.download = (MOTIFS[currentMotif]||{name:'obrazek'}).name + '.png';
  a.target = '_blank';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

/* ── RESIZE ── */
window.addEventListener('resize', function(){
  if(currentMotif) resizeCanvases();
});
