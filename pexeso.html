<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Pexeso – Tichý koutek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{background:#F5F0E8;font-family:'Nunito',sans-serif;max-width:480px;margin:0 auto;min-height:100dvh;overflow-x:hidden}

/* HEADER */
.hdr{background:#3C3489;padding:1.2rem 1rem 1.1rem;display:flex;align-items:center;gap:.8rem;border-radius:0 0 22px 22px}
.back-btn{background:rgba(255,255,255,.15);border:none;color:#EEEDFE;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;padding:8px 14px;border-radius:12px;cursor:pointer;text-decoration:none;display:inline-block;flex-shrink:0}
.hdr-text h1{font-size:20px;font-weight:800;color:#EEEDFE}
.hdr-text p{font-size:11px;color:#AFA9EC;margin-top:1px}

/* SELECT VIEW */
.sets-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px}
.set-card{border-radius:18px;padding:1rem .9rem;cursor:pointer;border:3px solid transparent;text-align:left;transition:transform .12s,border-color .12s;display:flex;flex-direction:column;gap:5px}
.set-card:active{transform:scale(.93)}
.set-emoji{font-size:30px;line-height:1}
.set-name{font-size:13px;font-weight:800;line-height:1.25;margin-top:3px}
.set-sub{font-size:11px;font-weight:700;opacity:.55}

/* GAME VIEW */
#game-view{display:none;flex-direction:column;min-height:100dvh}
.game-hdr{background:#3C3489;padding:1rem;display:flex;align-items:center;gap:.7rem;border-radius:0 0 22px 22px}
.game-title{font-size:16px;font-weight:800;color:#EEEDFE;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pairs-badge{background:rgba(255,255,255,.2);color:#EEEDFE;font-size:13px;font-weight:800;padding:5px 12px;border-radius:12px;white-space:nowrap;flex-shrink:0}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:10px;align-content:start}

/* CARDS */
.card{aspect-ratio:5/6;cursor:pointer;perspective:700px;-webkit-perspective:700px;user-select:none}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;-webkit-transform-style:preserve-3d;transition:transform .38s cubic-bezier(.4,0,.2,1)}
.card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;border-radius:16px;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card-back{background:#3C3489;box-shadow:0 3px 10px rgba(0,0,0,.18)}
.card-front{transform:rotateY(180deg);box-shadow:0 3px 10px rgba(0,0,0,.12)}
.card-front svg{width:70%;height:70%}
.card.matched .card-front{box-shadow:0 0 0 4px #1D9E75,0 3px 10px rgba(0,0,0,.12);transition:box-shadow .2s}
.card.wrong .card-front{box-shadow:0 0 0 4px #E24B4A,0 3px 10px rgba(0,0,0,.12)}

/* WIN OVERLAY */
#win-overlay{display:none;position:fixed;inset:0;background:rgba(20,18,44,.88);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:2rem}
#win-overlay.show{display:flex}
.win-emoji{font-size:80px;animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
.win-title{font-size:32px;font-weight:900;color:white}
.win-sub{font-size:15px;color:#AFA9EC;font-weight:700}
.win-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.win-btn{font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;padding:13px 26px;border-radius:16px;border:none;cursor:pointer}
.btn-primary{background:#EF9F27;color:#2C1A00}
.btn-secondary{background:rgba(255,255,255,.15);color:white}
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:99}
@keyframes pop{0%{transform:scale(0) rotate(-10deg)}80%{transform:scale(1.15) rotate(3deg)}100%{transform:scale(1) rotate(0)}}
</style>
</head>
<body>

<!-- SELECT VIEW -->
<div id="select-view">
  <header class="hdr">
    <a href="index.html" class="back-btn">← Zpět</a>
    <div class="hdr-text"><h1>Pexeso</h1><p>Vyber si sadu karet</p></div>
  </header>
  <div class="sets-grid" id="sets-grid"></div>
</div>

<!-- GAME VIEW -->
<div id="game-view">
  <header class="game-hdr">
    <button class="back-btn" onclick="showSelect()">← Zpět</button>
    <span class="game-title" id="game-title">Pexeso</span>
    <span class="pairs-badge"><span id="pairs-count">0</span>&nbsp;/&nbsp;6</span>
  </header>
  <div class="board" id="board"></div>
</div>

<!-- WIN -->
<div id="win-overlay">
  <div class="win-emoji">🎉</div>
  <div class="win-title">Výborně!</div>
  <div class="win-sub">Našel/a jsi všechny páry!</div>
  <div class="win-btns">
    <button class="win-btn btn-primary" onclick="replaySet()">Hrát znovu</button>
    <button class="win-btn btn-secondary" onclick="showSelect()">Jiná sada</button>
  </div>
</div>
<canvas id="confetti-canvas"></canvas>

// ═══════════════════════════════════════════════
// STAV HRY
// ═══════════════════════════════════════════════
let currentSet=null, cards=[], first=null, second=null, locked=false, matched=0;

// ═══════════════════════════════════════════════
// INIT — vykreslení výběru sad
// ═══════════════════════════════════════════════
function initSelect(){
  const grid=document.getElementById('sets-grid');
  grid.innerHTML=SETS.map(s=>`
    <button class="set-card" style="background:${s.bg};color:${s.fg}" onclick="startGame('${s.id}')">
      <span class="set-emoji">${s.emoji}</span>
      <span class="set-name">${s.name}</span>
      <span class="set-sub">6 párů</span>
    </button>
  `).join('');
}

// ═══════════════════════════════════════════════
// ZOBRAZENÍ VIEWS
// ═══════════════════════════════════════════════
function showSelect(){
  document.getElementById('select-view').style.display='block';
  document.getElementById('game-view').style.display='none';
  document.getElementById('win-overlay').classList.remove('show');
  window.scrollTo(0,0);
}
function showGame(){
  document.getElementById('select-view').style.display='none';
  document.getElementById('game-view').style.display='flex';
  window.scrollTo(0,0);
}

// ═══════════════════════════════════════════════
// SPUŠTĚNÍ HRY
// ═══════════════════════════════════════════════
function startGame(setId){
  currentSet=SETS.find(s=>s.id===setId);
  const icons=[...currentSet.icons,...currentSet.icons];
  for(let i=icons.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [icons[i],icons[j]]=[icons[j],icons[i]];
  }
  cards=icons.map((icon,idx)=>({icon,idx}));
  matched=0; first=null; second=null; locked=false;
  document.getElementById('game-title').textContent=currentSet.name;
  document.getElementById('pairs-count').textContent='0';
  renderBoard();
  showGame();
}

function replaySet(){ startGame(currentSet.id); }

// ═══════════════════════════════════════════════
// RENDEROVÁNÍ HERNÍ PLOCHY
// ═══════════════════════════════════════════════
function renderBoard(){
  const board=document.getElementById('board');
  board.innerHTML=cards.map((card,i)=>`
    <div class="card" id="c${i}" onclick="flipCard(${i})">
      <div class="card-inner">
        <div class="card-face card-back">
          <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" width="60%" height="60%">
            <circle cx="40" cy="40" r="36" fill="rgba(255,255,255,.12)"/>
            <circle cx="40" cy="40" r="24" fill="rgba(255,255,255,.1)"/>
            <rect x="37" y="14" width="6" height="52" fill="rgba(255,255,255,.18)" rx="3"/>
            <rect x="14" y="37" width="52" height="6" fill="rgba(255,255,255,.18)" rx="3"/>
          </svg>
        </div>
        <div class="card-face card-front" style="background:${currentSet.bg}">
          <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">${I[card.icon]}</svg>
        </div>
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════
// LOGIKA KARET
// ═══════════════════════════════════════════════
function flipCard(idx){
  if(locked) return;
  const el=document.getElementById('c'+idx);
  if(el.classList.contains('flipped')||el.classList.contains('matched')) return;
  el.classList.add('flipped');

  if(!first){ first={idx,icon:cards[idx].icon}; return; }
  second={idx,icon:cards[idx].icon};
  locked=true;

  if(first.icon===second.icon){
    setTimeout(()=>{
      document.getElementById('c'+first.idx).classList.add('matched');
      document.getElementById('c'+second.idx).classList.add('matched');
      matched++;
      document.getElementById('pairs-count').textContent=matched;
      first=null; second=null; locked=false;
      if(matched===6) setTimeout(showWin,600);
    },300);
  } else {
    document.getElementById('c'+first.idx).classList.add('wrong');
    document.getElementById('c'+second.idx).classList.add('wrong');
    setTimeout(()=>{
      document.getElementById('c'+first.idx).classList.remove('flipped','wrong');
      document.getElementById('c'+second.idx).classList.remove('flipped','wrong');
      first=null; second=null; locked=false;
    },900);
  }
}

// ═══════════════════════════════════════════════
// VÝHRA
// ═══════════════════════════════════════════════
function showWin(){
  document.getElementById('win-overlay').classList.add('show');
  startConfetti();
}

// ═══════════════════════════════════════════════
// KONFETY
// ═══════════════════════════════════════════════
function startConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const colors=['#EF9F27','#E24B4A','#639922','#378ADD','#993556','#FAC775','#3C3489','#1D9E75'];
  const pieces=Array.from({length:90},()=>({
    x:Math.random()*canvas.width,
    y:Math.random()*-canvas.height*0.6,
    r:Math.random()*7+4,
    color:colors[Math.floor(Math.random()*colors.length)],
    vx:(Math.random()-.5)*4,
    vy:Math.random()*4+2,
    rot:Math.random()*Math.PI*2,
    vrot:(Math.random()-.5)*.15,
    shape:Math.random()>.5?'circle':'rect'
  }));
  let frame, t=0;
  function draw(){
    t++;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle=p.color;
      if(p.shape==='rect'){ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r)}
      else{ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}
      ctx.restore();
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vrot;
      if(p.y>canvas.height){p.y=-20;p.x=Math.random()*canvas.width;}
    });
    frame=requestAnimationFrame(draw);
    if(t>200){cancelAnimationFrame(frame);ctx.clearRect(0,0,canvas.width,canvas.height);}
  }
  draw();
}
